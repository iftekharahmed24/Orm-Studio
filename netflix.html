<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - log in or sign up</title>
    <link rel="stylesheet" href="netflix.css">
</head>
<body>

    <div class="netflix-container">

        <div class="overlay"></div>

        <div class="logo-container">

            <img src="netflix logo.png" alt="">

        </div>

        <div class="signin-container">

            <form action="" class="form-container">

                <h1>Sign In</h1>

                <input class="input" type="email" name="" id="" placeholder="Enter Your Email"><br>

                <input class="input" type="password" name="" id="" placeholder="Password"><br>

                <button class="sign">Sign In</button>

                <div class="or">OR</div>

                <button class="code">Use a sign-in code</button>

                <a href="#" class="forgot">Forgot password?</a>

                <div class="remember">

                    <label for="remember">Remember me</label>
                    <input type="checkbox" name="" id="remember" checked>

                </div>

                <p class="signup">New to Netflix?<a href="">Sign up now.</a></p>

                <p class="captcha">This page is protected by Google reCAPTCHA to ensure you're not a bot. <a href="">Learn more.</a></p>

            </form>

        </div>

    </div>
    
</body>
</html>
